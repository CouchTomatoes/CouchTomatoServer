name: Mirror Upstream Tags (one-off)

# Manually-triggered, single-use workflow: fetches CouchPotato/CouchPotatoServer's
# tags and pushes them here, then mirrors any matching GitHub Release metadata
# (title/body/prerelease flag) so the Releases view matches the upstream repo
# exactly rather than just having bare tags. Runs on GitHub's own infrastructure
# using GITHUB_TOKEN, which is not subject to this session's git-proxy restrictions.
# Safe to delete once it's been run.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror-tags:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags from upstream CouchPotato
        run: |
          git remote add upstream https://github.com/CouchPotato/CouchPotatoServer.git
          git fetch upstream --tags

      - name: Push tags to this repo
        run: git push origin --tags

      - name: Mirror matching GitHub Releases from upstream, if any exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mirrored=0
          tag_only=0
          for tag in $(git tag -l); do
            # Skip this repo's own semver release tags (from release.yml)
            case "$tag" in v[0-9]*) continue;; esac

            resp=$(curl -s -o /tmp/rel.json -w '%{http_code}' \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/CouchPotato/CouchPotatoServer/releases/tags/$tag")

            if [ "$resp" = "200" ]; then
              name=$(jq -r '.name // ""' /tmp/rel.json)
              body=$(jq -r '.body // ""' /tmp/rel.json)
              prerelease=$(jq -r '.prerelease' /tmp/rel.json)
              [ -z "$name" ] && name="$tag"
              extra=""
              [ "$prerelease" = "true" ] && extra="--prerelease"
              echo "Mirroring release for $tag ($name)"
              gh release create "$tag" --title "$name" --notes "$body" $extra \
                || echo "  (release create failed or already exists for $tag)"
              mirrored=$((mirrored + 1))
            else
              tag_only=$((tag_only + 1))
            fi
          done
          echo "## Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Releases mirrored with real upstream metadata: $mirrored" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tags pushed with no upstream Release object (tag-only): $tag_only" >> "$GITHUB_STEP_SUMMARY"
