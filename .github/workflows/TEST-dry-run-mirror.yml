name: TEST dry-run mirror logic

# Temporary, throwaway test of mirror-releases-to-target.yml's read/parse/
# iterate logic against the real release data in this repo, WITHOUT calling
# gh release create/edit — proves the pagination, jq field extraction, and
# EOF-safe while-read loop all work correctly at real scale (~22 releases,
# some with multi-KB multiline markdown bodies) before handing the real
# workflow to a repo this session can't write-test against directly.
#
# DELETE THIS FILE once the dry run is confirmed correct — it is not meant
# to be kept.

on:
  workflow_dispatch: {}

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Dry-run the exact mirror logic
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          releases_json=$(gh api "repos/CodeAhmed/CouchTomato/releases" --paginate)
          count=$(echo "$releases_json" | jq 'length')
          echo "Found $count releases"

          seen=0
          echo "$releases_json" | jq -c '.[]' | while IFS= read -r rel || [ -n "$rel" ]; do
            tag=$(echo "$rel" | jq -r '.tag_name')
            title=$(echo "$rel" | jq -r '.name // .tag_name')
            draft=$(echo "$rel" | jq -r '.draft')
            prerelease=$(echo "$rel" | jq -r '.prerelease')
            body_len=$(echo "$rel" | jq -r '.body // "" | length')

            tag_exists="no"
            git rev-parse "refs/tags/$tag" >/dev/null 2>&1 && tag_exists="yes"

            echo "SEEN tag=$tag title=\"$title\" draft=$draft prerelease=$prerelease body_len=$body_len tag_exists_locally=$tag_exists"
          done | tee /tmp/dryrun.log

          seen=$(grep -c '^SEEN ' /tmp/dryrun.log || true)
          echo "----"
          echo "Total releases from API: $count"
          echo "Total lines processed by the while-read loop: $seen"
          if [ "$seen" -eq "$count" ]; then
            echo "PASS: loop processed every release, none dropped."
          else
            echo "FAIL: loop processed $seen but API returned $count — investigate."
            exit 1
          fi
        shell: bash
