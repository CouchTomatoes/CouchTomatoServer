name: Fix v4.0.0 release notes

# One-off, manually-triggered workflow to backfill the v4.0.0 release notes.
# v4.0.0 was cut by release.yml before it accounted for the "first release"
# case, so its notes only covered the single push that triggered it instead
# of all of CouchTomato's own work since the upstream Python 2 import
# boundary. This regenerates and edits that release's body in place using
# the same NEW/FIX badge logic release.yml now uses for a first release.
#
# Safe to delete once it's been run.

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fix-notes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate full release notes
        id: notes
        run: |
          new_badge='![new](https://f.cloud.github.com/assets/38136/745795/740c50b0-e41a-11e2-9616-0ce4ea95e1a6.png)'
          fix_badge='![fix](https://f.cloud.github.com/assets/38136/745794/7404d5ec-e41a-11e2-8980-93db26f9a342.png)'

          new_lines=$(mktemp)
          fix_lines=$(mktemp)

          git log 7260c12f..v4.0.0 --no-merges --pretty=format:'%s' | while IFS= read -r subject; do
            [ -z "$subject" ] && continue
            if printf '%s\n' "$subject" | grep -qiE '^(fix|fixed|fixes|bugfix|hotfix)\b'; then
              printf '%s %s\n' "$fix_badge" "$subject" >> "$fix_lines"
            else
              printf '%s %s\n' "$new_badge" "$subject" >> "$new_lines"
            fi
          done

          notes_file=notes.md
          [ -s "$new_lines" ] && cat "$new_lines" >> "$notes_file"
          if [ -s "$new_lines" ] && [ -s "$fix_lines" ]; then
            echo >> "$notes_file"
          fi
          [ -s "$fix_lines" ] && cat "$fix_lines" >> "$notes_file"
          [ -s "$notes_file" ] || echo 'No notable changes.' > "$notes_file"
        shell: bash

      - name: Edit v4.0.0 release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit v4.0.0 --notes-file notes.md --repo "$GITHUB_REPOSITORY"
