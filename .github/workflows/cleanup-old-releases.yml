name: Cleanup old releases

# One-off, manually-triggered workflow to remove the v1.0.0/v1.0.1/v1.0.2
# releases and tags — a retired false start before CouchTomato's version
# numbers were set to start at v4.0.0 instead. Uses the repo's own
# GITHUB_TOKEN so it isn't subject to the tag-push restriction on this
# session's proxied git credentials (see SUGGESTIONS.md).
#
# Safe to delete once it's been run.

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Delete v1.0.0/v1.0.1/v1.0.2 releases and tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for tag in v1.0.0 v1.0.1 v1.0.2; do
            echo "Deleting release $tag ..."
            gh release delete "$tag" --yes --repo "$GITHUB_REPOSITORY" || echo "  (no release $tag, or already gone)"
            echo "Deleting tag ref $tag ..."
            git push origin ":refs/tags/$tag" || echo "  (no tag $tag, or already gone)"
          done
