name: Release

# Fires on every push to main (i.e. every merged PR) and cuts a new GitHub
# Release. CouchTomato's own version numbers start at v4.0.0 (v1.0.x was a
# false start, retired — see SUGGESTIONS.md); after that the patch version
# auto-increments from the latest existing v4+ tag. Release notes use the
# same NEW/FIX badge-icon style as the mirrored upstream CouchPotato releases,
# and are built from everything since the *last release tag* — not since the
# last push. github.event.before turned out to be unreliable when multiple
# merges land in quick succession (observed 2026-07-10: several releases in a
# row came out "No notable changes" or missing commits because the recorded
# "before" SHA didn't match the actually-preceding release). Tag-based ranges
# don't have that problem — they're computed from real git state, not event
# metadata that can lag behind rapid pushes.

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          # Only consider v4.0.0+ tags — v1.0.0/v1.0.1/v1.0.2 were a retired
          # false start and must never influence numbering again, even if one
          # somehow still exists at release time.
          latest=$(git tag --list 'v*.*.*' --sort=-v:refname | grep -Ev '^v[123]\.' | head -n1)
          if [ -z "$latest" ]; then
            next="v4.0.0"
          else
            IFS='.' read -r major minor patch <<< "${latest#v}"
            next="v${major}.${minor}.$((patch + 1))"
          fi
          echo "Latest tag: ${latest:-none}"
          echo "Next version: $next"
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$latest" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          new_badge='![new](https://f.cloud.github.com/assets/38136/745795/740c50b0-e41a-11e2-9616-0ce4ea95e1a6.png)'
          fix_badge='![fix](https://f.cloud.github.com/assets/38136/745794/7404d5ec-e41a-11e2-8980-93db26f9a342.png)'

          latest_tag="${{ steps.version.outputs.latest_tag }}"
          if [ -z "$latest_tag" ]; then
            # First CouchTomato release ever cut — summarize all of our own
            # commits since the upstream Python 2 CouchPotato import boundary
            # (see CLAUDE.md), not just the single push that triggered this.
            range="7260c12f..HEAD"
          else
            range="${latest_tag}..HEAD"
          fi

          new_lines=$(mktemp)
          fix_lines=$(mktemp)

          # `format:` deliberately omits a trailing newline after the last
          # entry, and a bare `while read` silently drops any final line
          # that isn't newline-terminated — the `|| [ -n "$subject" ]` is
          # required or a single-commit range (the common case) produces
          # zero loop iterations and "No notable changes." every time.
          git log "$range" --no-merges --pretty=format:'%s' | while IFS= read -r subject || [ -n "$subject" ]; do
            [ -z "$subject" ] && continue
            if printf '%s\n' "$subject" | grep -qiE '^(fix|fixed|fixes|bugfix|hotfix)\b'; then
              printf '%s %s\n' "$fix_badge" "$subject" >> "$fix_lines"
            else
              printf '%s %s\n' "$new_badge" "$subject" >> "$new_lines"
            fi
          done

          notes_file=$(mktemp)
          [ -s "$new_lines" ] && cat "$new_lines" >> "$notes_file"
          if [ -s "$new_lines" ] && [ -s "$fix_lines" ]; then
            echo >> "$notes_file"
          fi
          [ -s "$fix_lines" ] && cat "$fix_lines" >> "$notes_file"
          [ -s "$notes_file" ] || echo 'No notable changes.' > "$notes_file"

          {
            echo "body<<RELEASE_NOTES_EOF"
            cat "$notes_file"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
          target_commitish: ${{ github.sha }}

  build-windows:
    needs: release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pywin32

      - name: Build with PyInstaller
        run: pyinstaller --clean --noconfirm packaging/couchtomato.spec

      - name: Install NSIS
        run: choco install -y nsis

      - name: Build installer
        run: |
          $version = "${{ needs.release.outputs.version }}".TrimStart("v")
          & "C:\Program Files (x86)\NSIS\makensis.exe" `
            "/DAPP_VERSION=$version" `
            "/DDIST_DIR=$pwd\dist\CouchTomato" `
            "/DICON_PATH=$pwd\couchpotato\static\images\icons\favicon.ico" `
            packaging\windows\installer.nsi

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $installer = (Get-ChildItem "packaging\windows\CouchTomato-Setup-*.exe" | Select-Object -First 1).FullName
          gh release upload "${{ needs.release.outputs.version }}" `
            "$installer" `
            --repo "${{ github.repository }}" `
            --clobber

  build-macos:
    needs: release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --clean --noconfirm packaging/couchtomato.spec

      - name: Build DMG
        run: |
          version="${{ needs.release.outputs.version }}"
          version="${version#v}"
          dmg_name="CouchTomato-${version}.dmg"
          mkdir -p dist/dmg
          cp -R dist/CouchTomato.app dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create -volname "CouchTomato" -srcfolder dist/dmg -ov -format UDZO "$dmg_name"
          echo "DMG_NAME=$dmg_name" >> "$GITHUB_ENV"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.release.outputs.version }}" \
            "$DMG_NAME" \
            --repo "${{ github.repository }}" \
            --clobber
