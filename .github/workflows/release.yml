name: Release

# Fires on every push to main (i.e. every merged PR) and cuts a new GitHub
# Release. CouchTomato's own version numbers start at v4.0.0 (v1.0.x was a
# false start, retired — see SUGGESTIONS.md); after that the patch version
# auto-increments from the latest existing v4+ tag. Release notes use the
# same NEW/FIX badge-icon style as the mirrored upstream CouchPotato releases,
# and are built from everything since the *last release tag* — not since the
# last push. github.event.before turned out to be unreliable when multiple
# merges land in quick succession (observed 2026-07-10: several releases in a
# row came out "No notable changes" or missing commits because the recorded
# "before" SHA didn't match the actually-preceding release). Tag-based ranges
# don't have that problem — they're computed from real git state, not event
# metadata that can lag behind rapid pushes.
#
# Every release attaches build artifacts for every platform/arch CouchTomato
# can currently be packaged for (see packaging/couchtomato.spec for why the
# PyInstaller build itself works the way it does):
#   - Windows x64: NSIS installer (.exe) + portable zip
#   - Windows arm64: portable zip (NSIS install attempted too, best-effort -
#     x86 NSIS under Windows-on-ARM emulation is unverified on real hardware)
#   - Linux x64/arm64: .tar.gz + .AppImage
#   - macOS universal2 (x64+arm64 in one binary): .dmg + .app.tar.gz, built
#     by building natively on both an Intel and an Apple Silicon runner, then
#     lipo-merging the two into a single universal binary (see
#     build-macos-universal below) - a normal single-arch build can only
#     satisfy visitors on the same CPU architecture as the build machine.

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          # Only consider v4.0.0+ tags — v1.0.0/v1.0.1/v1.0.2 were a retired
          # false start and must never influence numbering again, even if one
          # somehow still exists at release time.
          latest=$(git tag --list 'v*.*.*' --sort=-v:refname | grep -Ev '^v[123]\.' | head -n1)
          if [ -z "$latest" ]; then
            next="v4.0.0"
          else
            IFS='.' read -r major minor patch <<< "${latest#v}"
            next="v${major}.${minor}.$((patch + 1))"
          fi
          echo "Latest tag: ${latest:-none}"
          echo "Next version: $next"
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$latest" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          new_badge='![new](https://f.cloud.github.com/assets/38136/745795/740c50b0-e41a-11e2-9616-0ce4ea95e1a6.png)'
          fix_badge='![fix](https://f.cloud.github.com/assets/38136/745794/7404d5ec-e41a-11e2-8980-93db26f9a342.png)'

          latest_tag="${{ steps.version.outputs.latest_tag }}"
          if [ -z "$latest_tag" ]; then
            # First CouchTomato release ever cut — summarize all of our own
            # commits since the upstream Python 2 CouchPotato import boundary
            # (see CLAUDE.md), not just the single push that triggered this.
            range="7260c12f..HEAD"
          else
            range="${latest_tag}..HEAD"
          fi

          new_lines=$(mktemp)
          fix_lines=$(mktemp)

          # `format:` deliberately omits a trailing newline after the last
          # entry, and a bare `while read` silently drops any final line
          # that isn't newline-terminated — the `|| [ -n "$subject" ]` is
          # required or a single-commit range (the common case) produces
          # zero loop iterations and "No notable changes." every time.
          git log "$range" --no-merges --pretty=format:'%s' | while IFS= read -r subject || [ -n "$subject" ]; do
            [ -z "$subject" ] && continue
            if printf '%s\n' "$subject" | grep -qiE '^(fix|fixed|fixes|bugfix|hotfix)\b'; then
              printf '%s %s\n' "$fix_badge" "$subject" >> "$fix_lines"
            else
              printf '%s %s\n' "$new_badge" "$subject" >> "$new_lines"
            fi
          done

          notes_file=$(mktemp)
          [ -s "$new_lines" ] && cat "$new_lines" >> "$notes_file"
          if [ -s "$new_lines" ] && [ -s "$fix_lines" ]; then
            echo >> "$notes_file"
          fi
          [ -s "$fix_lines" ] && cat "$fix_lines" >> "$notes_file"
          [ -s "$notes_file" ] || echo 'No notable changes.' > "$notes_file"

          {
            echo "body<<RELEASE_NOTES_EOF"
            cat "$notes_file"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
          target_commitish: ${{ github.sha }}

  build-windows:
    needs: release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pywin32

      - name: Build with PyInstaller
        run: pyinstaller --clean --noconfirm packaging/couchtomato.spec

      - name: Build portable zip
        run: |
          $version = "${{ needs.release.outputs.version }}".TrimStart("v")
          Compress-Archive -Path "dist\CouchTomato\*" -DestinationPath "CouchTomato-$version-win_x64.zip"

      - name: Install NSIS
        run: choco install -y nsis

      - name: Build installer
        run: |
          $version = "${{ needs.release.outputs.version }}".TrimStart("v")
          & "C:\Program Files (x86)\NSIS\makensis.exe" `
            "/DAPP_VERSION=$version" `
            "/DDIST_DIR=$pwd\dist\CouchTomato" `
            "/DICON_PATH=$pwd\couchpotato\static\images\icons\favicon.ico" `
            packaging\windows\installer.nsi

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ needs.release.outputs.version }}".TrimStart("v")
          gh release upload "${{ needs.release.outputs.version }}" `
            "CouchTomato-$version-win_x64.zip" `
            "packaging\windows\CouchTomato-Setup-$version.exe" `
            --repo "${{ github.repository }}" `
            --clobber

  build-windows-arm64:
    needs: release
    runs-on: windows-11-arm
    continue-on-error: true # new/preview hosted runner label - don't block the rest of the release if it's unavailable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pywin32

      - name: Build with PyInstaller
        run: pyinstaller --clean --noconfirm packaging/couchtomato.spec

      - name: Build portable zip
        run: |
          $version = "${{ needs.release.outputs.version }}".TrimStart("v")
          Compress-Archive -Path "dist\CouchTomato\*" -DestinationPath "CouchTomato-$version-win_arm64.zip"

      - name: Upload zip to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ needs.release.outputs.version }}".TrimStart("v")
          gh release upload "${{ needs.release.outputs.version }}" `
            "CouchTomato-$version-win_arm64.zip" `
            --repo "${{ github.repository }}" `
            --clobber

      # Best-effort only: NSIS itself only ships x86/x64 binaries, so this
      # relies on Windows-on-ARM's x86 emulation working inside the runner -
      # unverified on real hardware. If it fails, the portable zip above has
      # already been uploaded, so arm64 users aren't left with nothing.
      - name: Install NSIS
        run: choco install -y nsis
        continue-on-error: true

      - name: Build installer
        continue-on-error: true
        run: |
          $version = "${{ needs.release.outputs.version }}".TrimStart("v")
          & "C:\Program Files (x86)\NSIS\makensis.exe" `
            "/DAPP_VERSION=$version" `
            "/DDIST_DIR=$pwd\dist\CouchTomato" `
            "/DICON_PATH=$pwd\couchpotato\static\images\icons\favicon.ico" `
            packaging\windows\installer.nsi

      - name: Upload installer to release (if it built)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ needs.release.outputs.version }}".TrimStart("v")
          $installer = "packaging\windows\CouchTomato-Setup-$version.exe"
          if (Test-Path $installer) {
            gh release upload "${{ needs.release.outputs.version }}" `
              "$installer" --repo "${{ github.repository }}" --clobber
          }

  build-linux:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --clean --noconfirm packaging/couchtomato.spec

      - name: Package tar.gz
        run: |
          version="${{ needs.release.outputs.version }}"
          version="${version#v}"
          tar czf "CouchTomato-${version}-linux_x64.tar.gz" -C dist CouchTomato

      - name: Build AppImage
        run: |
          version="${{ needs.release.outputs.version }}"
          version="${version#v}"
          bash packaging/linux/build-appimage.sh dist/CouchTomato x86_64 "CouchTomato-${version}-x86_64.AppImage"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ needs.release.outputs.version }}"
          version="${version#v}"
          gh release upload "${{ needs.release.outputs.version }}" \
            "CouchTomato-${version}-linux_x64.tar.gz" \
            "CouchTomato-${version}-x86_64.AppImage" \
            --repo "${{ github.repository }}" \
            --clobber

  build-linux-arm64:
    needs: release
    runs-on: ubuntu-24.04-arm
    continue-on-error: true # new/preview hosted runner label - don't block the rest of the release if it's unavailable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --clean --noconfirm packaging/couchtomato.spec

      - name: Package tar.gz
        run: |
          version="${{ needs.release.outputs.version }}"
          version="${version#v}"
          tar czf "CouchTomato-${version}-linux_arm64.tar.gz" -C dist CouchTomato

      - name: Build AppImage
        run: |
          version="${{ needs.release.outputs.version }}"
          version="${version#v}"
          bash packaging/linux/build-appimage.sh dist/CouchTomato aarch64 "CouchTomato-${version}-aarch64.AppImage"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ needs.release.outputs.version }}"
          version="${version#v}"
          gh release upload "${{ needs.release.outputs.version }}" \
            "CouchTomato-${version}-linux_arm64.tar.gz" \
            "CouchTomato-${version}-aarch64.AppImage" \
            --repo "${{ github.repository }}" \
            --clobber

  # macOS universal2 (x64+arm64 in one binary) is built from two separate
  # native builds - one per architecture - then merged with lipo, rather than
  # a single cross-compiled build. PyInstaller doesn't cross-compile, and
  # actions/setup-python's macOS interpreters are single-arch, so this is the
  # standard way to get a universal2 PyInstaller bundle. Genuinely unverified
  # beyond "this is the documented approach" - this sandbox has no macOS
  # toolchain at all, so the lipo-merge step in build-macos-universal below
  # can only be proven by a real run.
  build-macos-x64:
    needs: release
    runs-on: macos-15-intel # macos-13 was retired Dec 2025; this is the current Intel label
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Build with PyInstaller
        run: pyinstaller --clean --noconfirm packaging/couchtomato.spec

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64-build
          path: dist/CouchTomato.app
          include-hidden-files: true

  build-macos-arm64:
    needs: release
    runs-on: macos-latest # Apple Silicon
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Build with PyInstaller
        run: pyinstaller --clean --noconfirm packaging/couchtomato.spec

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-build
          path: dist/CouchTomato.app
          include-hidden-files: true

  build-macos-universal:
    needs: [release, build-macos-x64, build-macos-arm64]
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download x64 build
        uses: actions/download-artifact@v4
        with:
          name: macos-x64-build
          path: x64-app

      - name: Download arm64 build
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-build
          path: arm64-app

      - name: Merge into a universal2 .app with lipo
        run: |
          chmod +x arm64-app/Contents/MacOS/* x64-app/Contents/MacOS/* 2>/dev/null || true
          bash packaging/macos/merge-universal.sh arm64-app x64-app dist/CouchTomato.app

      # The app isn't signed with a paid Apple Developer ID (no certificate
      # available here), so this can't pass real Gatekeeper/notarization
      # checks - but an ad-hoc signature (identity "-") is still worth
      # applying: without ANY signature at all, recent macOS shows a hard
      # "is damaged and can't be opened" dialog with no way to launch it.
      # With an ad-hoc signature, Gatekeeper instead falls back to the
      # normal "unidentified developer" prompt, which users can bypass via
      # right-click > Open (see the wiki FAQ). lipo doesn't preserve
      # per-slice signatures across a merge, so this has to happen after
      # merging, not on the two single-arch builds beforehand.
      #
      # Deliberately no --deep on the top-level call: PyInstaller's bundle
      # includes non-standard subcomponents (e.g. Contents/Frameworks/
      # python3.11) that codesign's recursive deep-signing can't parse
      # ("bundle format unrecognized, invalid, or unsuitable"), failing the
      # whole signature.
      #
      # But signing *only* the top level isn't enough: sealing it fails with
      # "code object is not signed at all" on whichever embedded Mach-O file
      # codesign's resource scan finds first that isn't already signed (e.g.
      # a stray .so under Contents/Frameworks). A first attempt at fixing this
      # by ad-hoc-signing every direct entry under Frameworks (whether file or
      # directory) was wrong: plain data directories PyInstaller drops there
      # (e.g. certifi's package data) aren't valid signing targets at all -
      # `codesign` on a directory that isn't a real bundle/framework fails
      # with the same "bundle format unrecognized" error --deep hits, since
      # codesign tries to interpret it as one. Only actual Mach-O binaries
      # need (and can) be signed; codesign's resource-sealing scan only
      # requires code it recognizes as such to be signed, at any depth, and
      # otherwise treats a file as inert data needing no signature.
      #
      # A second attempt (find every Mach-O *file* via `file`, sign each one)
      # got past ~60 loose .so files cleanly, then failed on
      # Contents/Frameworks/Python.framework/Python: "bundle format is
      # ambiguous (could be app or framework)". Signing the raw binary
      # *inside* a .framework directory directly is ambiguous to codesign -
      # it can't tell whether that file is a stray loose binary or the
      # framework's primary executable, and refuses to guess.
      #
      # A third attempt signed the *.framework directory itself instead - hit
      # the exact same "ambiguous" error on the directory. This appears to be
      # inherent to how PyInstaller lays out its embedded Python.framework
      # (most likely retains bundle-identifying metadata baked into the
      # Python binary itself, copied from the real system framework, without
      # the accompanying Versions/Info.plist structure that would let
      # codesign resolve the ambiguity) - not something fixable by choosing a
      # different path to point codesign at.
      #
      # Every *other* embedded Mach-O binary (~60 .so files) signs cleanly as
      # a flat file. Making individual signing failures non-fatal (so
      # Python.framework's own stale pre-merge state is left alone) got
      # further, but the top-level seal then failed with the *original*
      # v4.0.25 error again - "code object is not signed at all" on
      # chardet/models/models.bin. Stripping the executable bit from
      # non-Mach-O files (on the theory codesign classifies "nested code" by
      # permission bit) fixed *that* file, but the very next run hit the
      # exact same error on a *different*, unrelated file in the same
      # directory - chardet/models/idf.bin - which the u+x filter never even
      # matched. So permission bits aren't the real mechanism; codesign's
      # resource-sealing scan is flagging plain data files as needing a
      # signature for some other reason, and which specific file it
      # complains about next is essentially unpredictable (it just stops at
      # the first one it finds each run). Trying to guess which individual
      # files need this is a losing game.
      #
      # Only *directories* need bundle-format interpretation (that's what
      # made signing "certifi" fail outright) - a flat, non-directory file
      # can always be ad-hoc-signed regardless of content, the same
      # mechanism that already works for the real Mach-O binaries. So: stop
      # trying to distinguish "real code" from "plain data" and just sign
      # every flat file under Frameworks (outside .framework dirs), Mach-O
      # or not - codesign accepts or rejects each individually and per-item
      # failures are already non-fatal here. This cleared every "code object
      # is not signed at all" complaint on individual files, but the
      # top-level seal then hit a *directory* it was never asked to sign:
      # Contents/Frameworks/python3.11 (distinct from python3__dot__11,
      # which holds the lib-dynload .so files already signed above) -
      # "bundle format unrecognized, invalid, or unsuitable", the same class
      # of error --deep originally hit and "certifi" hit when signed
      # directly. Making Python.framework's per-item signing failure
      # non-fatal was enough to stop the top-level seal complaining about
      # it specifically in later rounds - so extend that same tolerant
      # attempt to every other direct-child directory of Frameworks, not
      # just ones named *.framework: try to sign each as a whole unit,
      # accept that most of them (plain data dirs, non-standard PyInstaller
      # layout dirs) will fail to do so, and let that be fine.
      - name: Ad-hoc sign the merged app
        run: |
          while IFS= read -r -d '' d; do
            codesign --force --sign - "$d" || echo "warning: could not sign $d, continuing"
          done < <(find dist/CouchTomato.app/Contents/Frameworks -mindepth 1 -maxdepth 1 -type d -print0)

          while IFS= read -r -d '' f; do
            codesign --force --sign - "$f" || echo "warning: could not sign $f, continuing"
          done < <(find dist/CouchTomato.app/Contents/Frameworks -type f ! -path "*.framework/*" -print0)

          codesign --force --sign - dist/CouchTomato.app

      - name: Build DMG
        run: |
          version="${{ needs.release.outputs.version }}"
          version="${version#v}"
          dmg_name="CouchTomato-${version}.dmg"
          mkdir -p dist/dmg
          cp -R dist/CouchTomato.app dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create -volname "CouchTomato" -srcfolder dist/dmg -ov -format UDZO "$dmg_name"
          echo "DMG_NAME=$dmg_name" >> "$GITHUB_ENV"

      - name: Package .app.tar.gz
        run: |
          version="${{ needs.release.outputs.version }}"
          version="${version#v}"
          tar czf "CouchTomato-${version}-macos_universal.app.tar.gz" -C dist CouchTomato.app
          echo "APP_TARBALL=CouchTomato-${version}-macos_universal.app.tar.gz" >> "$GITHUB_ENV"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.release.outputs.version }}" \
            "$DMG_NAME" \
            "$APP_TARBALL" \
            --repo "${{ github.repository }}" \
            --clobber
