name: Backfill release notes

# One-off, manually-triggered workflow to regenerate v4.0.1 through v4.0.6's
# release notes using tag-based ranges. Those releases were cut while
# release.yml still based its range on github.event.before, which turned out
# to be unreliable when several merges landed in quick succession — several
# came out "No notable changes" or missing commits even though real work
# happened. This regenerates each one's notes from the previous tag to that
# tag, the same logic release.yml now uses going forward.
#
# Safe to delete once it's been run.

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Regenerate notes for v4.0.1 through v4.0.6
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          new_badge='![new](https://f.cloud.github.com/assets/38136/745795/740c50b0-e41a-11e2-9616-0ce4ea95e1a6.png)'
          fix_badge='![fix](https://f.cloud.github.com/assets/38136/745794/7404d5ec-e41a-11e2-8980-93db26f9a342.png)'

          tags=(v4.0.0 v4.0.1 v4.0.2 v4.0.3 v4.0.4 v4.0.5 v4.0.6)

          for i in $(seq 1 6); do
            prev="${tags[$((i-1))]}"
            cur="${tags[$i]}"

            new_lines=$(mktemp)
            fix_lines=$(mktemp)

            git log "${prev}..${cur}" --no-merges --pretty=format:'%s' | while IFS= read -r subject; do
              [ -z "$subject" ] && continue
              if printf '%s\n' "$subject" | grep -qiE '^(fix|fixed|fixes|bugfix|hotfix)\b'; then
                printf '%s %s\n' "$fix_badge" "$subject" >> "$fix_lines"
              else
                printf '%s %s\n' "$new_badge" "$subject" >> "$new_lines"
              fi
            done

            notes_file=notes-$cur.md
            [ -s "$new_lines" ] && cat "$new_lines" >> "$notes_file"
            if [ -s "$new_lines" ] && [ -s "$fix_lines" ]; then
              echo >> "$notes_file"
            fi
            [ -s "$fix_lines" ] && cat "$fix_lines" >> "$notes_file"
            [ -s "$notes_file" ] || echo 'No notable changes.' > "$notes_file"

            echo "=== $cur (since $prev) ==="
            cat "$notes_file"
            gh release edit "$cur" --notes-file "$notes_file" --repo "$GITHUB_REPOSITORY"
          done
        shell: bash
